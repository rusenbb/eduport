name: Desktop packages (smoke)

# Smoke build of the Tauri installers on every push to main and PR.
# Catches "the bundler step broke on platform X" before tag time.
# Tag-driven release builds live in release.yml.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # eduport-core path-deps vaultdb-core at a relative path
      # (../../../../researches/vaultdb/...) — clone vaultdb
      # side-by-side at the same relative location the runner
      # would otherwise lack. Cross-platform shell so the step
      # works on the Windows runner too.
      - name: Checkout vaultdb side-by-side
        shell: bash
        run: |
          mkdir -p ../../researches
          git clone --depth 1 https://github.com/rusenbb/vaultdb.git \
            ../../researches/vaultdb

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Type-check frontend
        run: npm --prefix frontend run check

      - name: Test frontend
        run: npm --prefix frontend exec vitest run

      - name: Build desktop package
        run: python3 scripts/build_desktop.py

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: eduport-${{ runner.os }}
          # Bundle path moved under crates/eduport-tauri/ when the
          # workspace was reorganised in rewrite phase 4.
          path: |
            crates/eduport-tauri/target/release/bundle/**/*
          if-no-files-found: error
